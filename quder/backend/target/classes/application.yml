server:
  port: ${PORT:8080}

spring:
  application:
    name: demo-backend
  
  # H2 Database Configuration
  datasource:
    url: jdbc:h2:file:./data/portfolio
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

# CORS Configuration
cors:
  allowed-origins: "*"

# 日志配置
logging:
  level:
    com.example.demo: DEBUG
    org.springframework.web: INFO
